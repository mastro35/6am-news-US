<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
    <div class="container">
        <header>
    <a href="{{ '/' | relative_url }}" class="logo-link">
        <img src="{{ '/assets/images/6amUS_banner.png' | relative_url }}" 
             alt="6am — world, at six" 
             class="site-logo">
    </a>
    <!-- Tag SEO accessibile -->
    <h1 class="sr-only">{{ site.title }}</h1>
         </header>

        <main>
            {{ content }}
        </main>

        <footer>
            &copy; {{ 'now' | date: "%Y" }} {{ site.title }}. Archivio quotidiano.
        </footer>
    </div>
</body>
</html>
