---
layout: default
---

{% assign latest_post = site.posts.first %}

{% if latest_post %}
  <article class="post">
    <header class="post-header">
      <time class="post-date">{{ latest_post.date | date: "%B %d, %Y" }}</time>
      <h1 class="post-title">{{ latest_post.title }}</h1>
    </header>

    <div class="post-content">
      {{ latest_post.content }}
    </div>
  </article>

  <div class="archive-footer-link">
    <a href="{{ '/archive/' | relative_url }}">← Browse all previous briefings in the Archive</a>
  </div>
{% endif %}
